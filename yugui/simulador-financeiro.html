<body>

       <center>
         <div class="header">

                    <div class="field-group">
                        <div class="field">
                            <span>Largura (m)</span>
                            <input id="inLargura" type="number" min="0" name="largura">
                        </div>
                        <div class="field">
                            <span>Comprimento (m)</span>
                            <input id="inComprimento" type="number" min="0" name="comprimento">
                        </div>
                        <div class="field">
                            <span>Profundidade (m)</span>
                            <input id="inProfundidade" type="number" min="0" name="profundidade">
                        </div>
                    </div>
                </div>
            
                <div class="field-wrapper">
                    <h3>• Sobre o Lote</h3>
                    <div class="field-group">
                        <div class="field">

                            <input id="inPeixes" type="number" min="0" name="peixes">
                        </div>
                        <div class="field">
                            <span>Peso Médio/Peixe (g)</span>

                        </div>
                        <!-- <div class="field">
                            <span>Quantidade de Ração/dia (Kg)</span>

                        </div> -->
                    </div>
                </div>

                    <div class="field-group">

                            <span>Preço da Tilápia (Kg)</span>
                            <input id="inPrecoPeixe" type="number" min="0" name="preco-tilapia">
                        </div>
                        <div class="field">
                            <span>Preço da Ração (Kg)</span>
                            <input id="inPrecoRacao" type="number" min="0" name="preco-racao">
                        </div>

<script>
    function calcular() {
        // === Configuração Inicial === //
        let largura = Number(inLargura.value);              // largura do viveiro, em metros
        let comprimento = Number(inComprimento.value);      // comprimento do viveiro, em metros
        let profundidade = Number(inProfundidade.value);    // profundidade do viveiro, em metros


        let qtdPeixes = Number(inPeixes.value);             // quantidade de peixes por viveiro
        let qtdViveiros = Number(inViveiros.value);         // quantidade de viveiros considerados

        let pesoKg = Number(inPeso.value)/ 1000;            // peso médio dos peixes, em kg
        // let racaoKg = Number(inRacao.value);                // ração/dia por viveiro

        let precoPeixe = Number(inPrecoPeixe.value);        // preço do quilo do peixe
        let precoRacao = Number(inPrecoRacao.value);        // preço do quilo da ração
        let precoBaseKelper = 500;                          // preço base do Kelper (arbitrário)
        
        // === Cálculos === //
        let risco = 0;                                      // risco base de eutrofização
        let limBiomassaHa = 10000;                          // limite saudável de biomassa por hectare
        let taxaArracoamento = 0;                           // taxa de arraçoamento
        
        // Cálculo da Taxa de Arraçoamento com base em valores da EMBRAPA
        if(pesoKg <= 0.05){                                       
            taxaArracoamento =  0.0425;
        }else if(pesoKg <= 0.15){
            taxaArracoamento = 0.035;
        }else if(pesoKg <= 0.25){
            taxaArracoamento =  0.03;
        }else if(pesoKg <= 0.35){
            taxaArracoamento = 0.025;
        }else if(pesoKg <= 0.7){
            taxaArracoamento =  0.02;
         }else if(pesoKg <= 1){
            taxaArracoamento =  0.015;
         }else {
            taxaArracoamento =  0.013;
         }

        let area = largura * comprimento;                   // area do viveiro, em m²

                                                            // 1ha = 10.000m²
        let hectares = area / 10000;                        // area do viveiro, em hectare (ha)

                                                            // limite saudável: 1-2 kg/m²
        let densidade = qtdPeixes / area;                   // densidade de peixes no viveiro, em kg/m²

        let pesoTotal = qtdPeixes * pesoKg;                 // peso total no viveiro, em kg

        // biomassa = capacidade de suporte, em (kg/m²) ou (kg/ha)
        let biomassaHa = pesoTotal / hectares;              // biomassa de peixes no viveiro, em ha

        let racaoDiaria = pesoTotal * taxaArracoamento;                 // estimativa da qtd de ração diaria por viveiro, considerando a taxa de arraçoamento.
        let racaoHa = racaoDiaria / hectares;               // ração por hectare no viveiro

        // Fator 1: Excesso de Biomassa
        /*
        A biomassa, ou capacidade de suporte, é um parâmetro que determina a
        quantidade máxima de peixes que pode ser sustentada dentro de um viveiro.
        Se ultrapassada, o crescimento dos peixes pode ser prejudicada e, eventualmente,
        levados à morte.

        expressa em hecatare, a capacidade limite de suporte, ou biomassa limite,
        é de 10.000 kg/ha.

        Diferença Biomassa x Densidade:

            - Densidade: expressa a quantidade de peixes por m² ou ha.
            ex: 20 alevinos ou 20 tilápias adultas gerariam a mesma densidade em 1 hectare: 20 peixes/ha

            - Biomassa: expressa o peso de peixes por m² ou ha.
            ex: 20 alevinos e 20 tilápias gerariam diferentes valores de biomassa:
                20 alevinos de 100g = 2kg/ha     | baixa
                20 tilápias de 1kg = 20kg/ha     | baixa, porém muito superior à de 20 alevinos


        Abaixo, um if/else que calcula o seguinte:
        - biomassa do viveiro > biomassa limite = risco aumenta em 50%
        - biomassa do viveiro > biomassa limite / 2 = risco aumenta em 25%

        obs: os valores 50% e 25% são arbitrários, eu os escolhi para que a 
        porcentagem ficassem dentro de múltiplos de 5 (0%, 25%, 50%, 75%, 100%).
        */
        if(biomassaHa > limBiomassaHa) {
            risco += 0.5;
        } else if (biomassaHa > limBiomassaHa/2) {
            risco += 0.25;
        }
        
        // Fator 2: Excesso de Ração
        /*
        A quantidade de ração presente no viveiro também é outro parâmetro que
        influencia diretamente no risco de eutrofização. Isso porque toda ração
        que não é consumida pelos peixes, vira nutriente para o meio e para os
        microorganismos presentes na água.

        Quanto o ambiente já está sendo forçado pela quantidade de nutrientes como
        ração e dejetos de peixes, ele não consegue absorver tudo e alguns parâmetros
        de qualidade da água, como pH, são alterados.

        O limite de ração ideal varia de situação para situação, mas o intervalo
        entre 60kg-90kg de ração por dia por hectare, é uma boa faixa que, quando
        ultrapassada, passa a ser tóxica para o ambiente.

        Abaixo, um if/else que calcula o seguinte:
        Aumento do risco de eutrofização com base nos limites estabelecidos acima
        de racao, em kg/dia/ha.

        obs: os valores 50% e 25% são arbitrários, eu os escolhi para que a 
        porcentagem ficassem dentro de múltiplos de 5 (0%, 25%, 50%, 75%, 100%).
        */
        if(racaoHa > 90) {
            risco += 0.5;
        } else if (racaoHa > 60) {
            risco += 0.25;
        }

        // pequena garantia de que o risco sempre estará na faixa 0% a 100%
        if(risco > 1) risco = 1;

        // Estimativa Financeira:
        // o valor que o viveiro representa para o piscicultor, em R$
        let valorLote = pesoTotal * precoPeixe * qtdViveiros;    

        // o valor gasto em ração em todos os viveiros
        let custoRacao = racaoDiaria * precoRacao * qtdViveiros; 

        // o valor do prejuízo sobre a perda dos peixes naquele viveiro, baseado no risco calculado acima
        // ex: valorTotal       = R$ 1.000,00
        //     risco            = 0.50 (50%)
        //     valorPrejuizo    = R$ 500,00 (pois foi considerado que 50% dos peixes naquele viveiro morreram, portanto 50% do valor daquele viveiro foi perdido) 
        let valorPrejuizo = (valorLote + custoRacao) * risco;

        // investimento total do sistema Kelper para instalar em todos os viveiros, em R$
        let investimentoKelper = precoBaseKelper * qtdViveiros;

        // quanto seria economizado pelo piscicultor, supondo que ele comprasse o Kelper, evitando o prejuizo previsto. em R$
        let economia = valorPrejuizo - investimentoKelper;

        // === Exibição das Informações === //
        inResponse.innerHTML = `
            <h2>Resultados</h2>
            <hr>
            <p>Densidade: <span>${densidade.toFixed(2)}</span> peixes/m²</p>
            <p>Biomassa: <span>${biomassaHa.toFixed(2)}</span> kg/ha</p>
            <p>Carga de Ração: <span>${racaoHa.toFixed(2)}</span>  kg/ha/dia</p>
            <hr>
            <p>Chance de Eutrofização: <span>${(risco * 100)}%</span></p>
            <p>Valor Total em Risco: <span>R$ ${valorPrejuizo.toFixed(2)}</span></p>
            <p>Investimento Kelper (${qtdViveiros} viveiros): <span>R$ ${investimentoKelper.toFixed(2)}</span></p>
            <hr>
            <h4 style="color: ${economia >= 0 ? "green" : "red"};">Economia Estimada: R$ ${economia.toFixed(2)}</h4>
        `;
    }

    function limpar() {
        inResponse.innerHTML = '';

        inLargura.value = "";
        inComprimento.value = "";
        inProfundidade.value = "";
        inPeixes.value = "";
        inViveiros.value = "";
        // inRacao.value = "";
        inPeso.value = "";
        inPrecoPeixe.value = "";
        inPrecoRacao.value = "";
        inResponse.innerHTML = "";
    }
</script>
