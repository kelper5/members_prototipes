<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kelper - Login</title>
</head>
<body>
    <div class="container">
        <div class="content">
            <figure class="logo"><img src="./img/LOGO.png" alt="Logo Kelper"></figure>
            <h1>Seja Bem-Vindo Novamente!</h1>
            <form action="">
                <div class="input">
                    <p>E-mail</p>
                    <input type="email" placeholder="exemplo@gmail.com">
                </div>
                <div class="input">
                    <p>Senha</p>
                    <input type="password" placeholder="********">
                </div>
                <button>Entrar</button>
                <div class="register-a">
                    <span>Não possui uma conta? </span><a href="register.html">Cadaste-se aqui!</a>
                </div>
            </form>
        </div>
        <figure>
            <img src="./img/fishes.jpg" alt="Imagem de cardume nadando">
        </figure>
    </div>
</body>
</html>
