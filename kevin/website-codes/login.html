<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kelper - Login</title>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="exitBtn">
                <a href="./index.html"><img src="./img/reject.png" alt=""></a>
            </div>
            <figure class="logo"><img src="./img/LOGO.png" alt="Logo Kelper"></figure>
            <h1>Seja Bem-Vindo Novamente!</h1>
            <form action="" class="login">
                <div class="input">
                    <p>E-mail</p>
                    <input type="email" placeholder="exemplo@gmail.com" id="ipt_email">
                </div>
                <div class="input">
                    <p>Senha</p>
                    <input type="password" placeholder="********" id="ipt_senha">
                </div>
                <button type="button" class="hover1" onclick="autenticar()">Entrar</button>
                <div class="register-a">
                    <span>Não possui uma conta? </span><a href="register.html">Cadaste-se aqui!</a>
                </div>
            </form>
        </div>
        <figure>
            <img src="./img/fishes.jpg" alt="Imagem de cardume nadando">
        </figure>
    </div>
</body>
</html>
<script>
    function autenticar() {
        let email = ipt_email.value
        let senha = ipt_senha.value
        if (email == "andy@gmail.com" && senha == "123123123") {
            window.location = "dashMain.html";
        } else {
            alert("Credenciais inválidas.")
        }
    }
</script>
