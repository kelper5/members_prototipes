<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kelper - Register</title>
</head>

<body>
    <div class="container">
        <div class="content">
            <figure class="logo"><img src="./img/LOGO.png" alt="Logo Kelper"></figure>
            <h1>Olá, Piscicultor. Vamos começar?</h1>
            <form action="" class="register">
                <div class="group">
                    <div class="input">
                        <p>Nome</p>
                        <input type="text" placeholder="João" id="ipt_nome">
                    </div>
                    <div class="input">
                        <p>Sobrenome</p>
                        <input type="text" placeholder="Silva" id="ipt_sobrenome">
                    </div>
                </div>
                <div class="group">
                    <div class="input">
                        <p>E-mail</p>
                        <input type="text" placeholder="joao@gmail.com" id="ipt_email">
                    </div>
                    <div class="input">
                        <p>CPF</p>
                        <input type="text" placeholder="12345678910" id="ipt_cpf">
                    </div>
                </div>
                <div class="group">
                    <div class="input">
                        <p>Senha</p>
                        <input type="password" placeholder="********" id="ipt_senha">
                    </div>
                    <div class="input">
                        <p>Confirmar senha</p>
                        <input type="password" placeholder="********" id="ipt_confirmacao_senha">
                    </div>
                </div>
                <div class="input">
                    <p>Código de ativação</p>
                    <input id="ipt_codigo" type="text" placeholder="ABC123" id="ipt_codigo">
                </div>

                <button type="button" onclick="validarCampos()" class="hover1">Registrar</button>
                <div class="register-a">
                    <span>Já possui uma conta? </span><a href="login.html">Entre aqui!</a>
                </div>
            </form>
        </div>
        <figure>
            <img src="./img/fishes.jpg" alt="Imagem de cardume nadando">
        </figure>
    </div>
</body>

</html>
