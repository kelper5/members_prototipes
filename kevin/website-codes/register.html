<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kelper - Register</title>
</head>

<body>
    <div class="container">
        <div class="content">
            <figure class="logo"><img src="./img/LOGO.png" alt="Logo Kelper"></figure>
            <h1>Olá, Piscicultor. Vamos começar?</h1>
            <form id="form_registro" action="" class="register" onsubmit="return validarCampos(event)">
                <div class="group">
                    <div class="input">
                        <p>Nome</p>
                        <input type="text" placeholder="João" minlength="2" maxlength="30" required>
                    </div>
                    <div class="input">
                        <p>Sobrenome</p>
                        <input type="text" placeholder="Silva" minlength="2" maxlength="70" required>
                    </div>
                </div>
                <div class="group">
                    <div class="input">
                        <p>Nome da propriedade</p>
                        <input type="text" placeholder="Peixes do João" minlength="2" maxlength="70">
                    </div>
                    <div class="input">
                        <p>CNPJ</p>
                        <input type="text" placeholder="12345678912345" minlength="14" maxlength="14" required>
                    </div>
                </div>
                <div class="group">
                    <div class="input">
                        <p>E-mail</p>
                        <input type="email" placeholder="joao@gmail.com" required>
                    </div>
                    <div class="input">
                        <p>Número de Telefone Celular</p>
                        <input id="ipt_numero" type="tel" placeholder="11912345678" minlength="11" maxlength="11"
                            required>
                    </div>
                </div>
                <div class="group">
                    <div class="input">
                        <p>Senha</p>
                        <input id="ipt_senha" type="password" placeholder="********" minlength="8" maxlength="128"
                            required>
                    </div>
                    <div class="input">
                        <p>Confirmar senha</p>
                        <input id="ipt_confirmacao_senha" type="password" placeholder="********" required>
                    </div>
                </div>

                <button type="submit">REGISTRAR</button>
                <div class="register-a">
                    <span>Já possui uma conta? </span><a href="login.html">Entre aqui!</a>
                </div>
            </form>
        </div>
        <figure>
            <img src="./img/fishes.jpg" alt="Imagem de cardume nadando">
        </figure>
    </div>
</body>

</html>
<script>
    function validarCampos() {

        event.preventDefault();

        let numero = Number(ipt_numero.value)
        let senha = ipt_senha.value
        let confirmacao_senha = ipt_confirmacao_senha.value

        const regexSenha = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
        const formulario = document.getElementById('form_registro');

        if (!formulario.checkValidity()) {
            formulario.reportValidity();
            return;
        }

        if (!Number.isInteger(numero)) {
            alert("Insira um número de telefone celular válido.")
            return
        }

        if (!regexSenha.test(senha)) {
            alert("A senha deve conter pelo menos:\n- Uma letra maiúscula\n- Uma letra minúscula\n- Um número\n- Um caractere especial (@$!%*?&)");
            return;
        }

        if (senha != confirmacao_senha) {
            alert("As senhas não coincidem. Por favor, tente novamente.")
            return
        }

        alert("Cadastro finalizado com sucesso! Tente se autenticar com seu novo cadastro.")
        window.location.href = "login.html";
    }
</script>
