<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Kelper - Register</title>
</head>
<body>
    <div class="container">
        <div class="content">
            <figure class="logo"><img src="./img/LOGO.png" alt="Logo Kelper"></figure>
            <h1>Olá, Piscicultor. Vamos começar?</h1>
            <form action="" class="register">
                <div class="group">
                    <div class="input">
                        <p>Nome</p>
                        <input type="text" placeholder="João">
                    </div>
                    <div class="input">
                        <p>Sobrenome</p>
                        <input type="text" placeholder="Silva">
                    </div>
                </div>
                <div class="group">
                    <div class="input">
                        <p>Nome da propriedade</p>
                        <input type="text" placeholder="Peixes do João">
                    </div>
                    <div class="input">
                        <p>CNPJ</p>
                        <input type="text" placeholder="12345678000112">
                    </div>
                </div>
                <div class="group">
                    <div class="input">
                        <p>E-mail</p>
                        <input type="email" placeholder="joao@gmail.com">
                    </div>
                    <div class="input">
                        <p>Telefone</p>
                        <input type="text" placeholder="11912345678">
                    </div>
                </div>
                <div class="group">
                    <div class="input">
                        <p>Senha</p>
                        <input type="password" placeholder="********">
                    </div>
                    <div class="input">
                        <p>Confirmar senha</p>
                        <input type="password" placeholder="********">
                    </div>
                </div>
                
                <button>REGISTRAR</button>
                <div class="register-a">
                    <span>Já possui uma conta? </span><a href="login.html">Entre aqui!</a>
                </div>
            </form>
        </div>
        <figure>
            <img src="./img/fishes.jpg" alt="Imagem de cardume nadando">
        </figure>
    </div>
</body>
</html>
